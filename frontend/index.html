
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<!-- PWA -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#8b5e3c">
<title>Auth Page</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<script src="script.js"></script>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(to bottom, #8b5e3c, #f3e2c7);
    padding: 15px;
}

/* CONTAINER */
.container {
    width: 100%;
    max-width: 380px;
    padding: 25px;
    border-radius: 18px;
    background: #f5e6d3;
    border: 2px solid #d2b48c;
    box-shadow: 0 10px 30px rgba(0,0,0,0.25);
}

/* TITLE */
h2 {
    text-align: center;
    margin-bottom: 20px;
    color: #5a3e2b;
    font-weight: 600;
}

/* INPUT */
input {
    width: 100%;
    padding: 14px;
    margin: 10px 0;
    border-radius: 12px;
    border: 1.5px solid #c8a97e;
    background: #fff8ee;
    outline: none;
    font-size: 14px;
}

/* BUTTON GROUP */
.btn-group {
    display: flex;
    gap: 10px;
    margin-top: 10px;
}

/* BUTTON */
.btn {
    flex: 1;
    padding: 12px;
    border-radius: 12px;
    border: none;
    cursor: pointer;
    font-weight: 500;
    transition: 0.2s;
}

.btn:hover {
    transform: scale(0.97);
}

/* BUTTON COLORS */
.login-btn {
    background: #8b5e3c;
    color: white;
}

.create-btn {
    background: #a67c52;
    color: white;
}

.cancel-btn {
    background: #d2b48c;
}

/* TOGGLE TEXT */
.toggle {
    text-align: center;
    margin-top: 15px;
    cursor: pointer;
    color: #5a3e2b;
    font-size: 14px;
}

.toggle:hover {
    text-decoration: underline;
}

/* HIDDEN */
.hidden {
    display: none;
}

/* ================== RESPONSIVE ================== */

/* TABLET */
@media (max-width: 768px) {
    .container {
        max-width: 90%;
        padding: 20px;
    }

    input {
        padding: 12px;
    }

    .btn {
        padding: 10px;
    }
}

/* MOBILE */
@media (max-width: 480px) {
    body {
        align-items: flex-start;
        padding-top: 40px;
    }

    .container {
        max-width: 100%;
        border-radius: 15px;
    }

    h2 {
        font-size: 20px;
    }

    input {
        font-size: 13px;
        padding: 10px;
    }

    .btn {
        font-size: 13px;
    }
}

/* ================== LOADER (index page) ================== */
#globalLoader {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: linear-gradient(to bottom, #8b5e3c, #f3e2c7);
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    z-index: 99999;
    gap: 20px;
    transition: opacity 0.3s ease;
}

#globalLoader.hidden {
    opacity: 0;
    pointer-events: none;
}

.loader-spinner {
    width: 56px;
    height: 56px;
    border: 6px solid #d4a373;
    border-top: 6px solid #5c4033;
    border-radius: 50%;
    animation: spinLoader 0.9s linear infinite;
}

.loader-text {
    font-family: 'Poppins', sans-serif;
    font-size: 1rem;
    color: #5c4033;
    font-weight: 600;
    letter-spacing: 1px;
    animation: pulseFade 1.4s ease-in-out infinite;
}

@keyframes spinLoader {
    to { transform: rotate(360deg); }
}

@keyframes pulseFade {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
}

/* ================== TOAST ================== */
#toastPopup {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%) translateY(100px);
    background: linear-gradient(135deg, #4b2e20, #6b4226);
    color: #f8f4ec;
    padding: 14px 28px;
    border-radius: 50px;
    font-size: 1rem;
    font-weight: 600;
    box-shadow: 0 6px 20px rgba(0,0,0,0.35);
    z-index: 9999;
    opacity: 0;
    transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    white-space: nowrap;
    border: 2px solid #d4a373;
    pointer-events: none;
}

#toastPopup.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
}
</style>
</head>

<body>

<!-- LOADER -->
<div id="globalLoader" class="hidden">
  <div class="loader-spinner"></div>
  <div class="loader-text">Please wait...</div>
</div>

<!-- TOAST -->
<div id="toastPopup"></div>

<div class="container">

    <!-- LOGIN -->
    <form id="login" autocomplete="off">
        <h2>Login</h2>

        <input type="text" id="loginUser" placeholder="Phone or Email" autocomplete="off" required>
        <input type="password" id="loginPass" placeholder="Password" autocomplete="new-password" required>

        <div class="btn-group">
            <button type="button" class="btn login-btn" onclick="login()">Login</button>
            <button type="button" class="btn cancel-btn" onclick="clearLogin()">Cancel</button>
        </div>

        <div class="toggle" onclick="showSignup()">Create new account</div>
    </form>

    <!-- SIGNUP -->
    <form id="signup" class="hidden" autocomplete="off">
        <h2>Create Account</h2>

        <input type="text" id="signupUser" placeholder="Phone or Email" autocomplete="off" required>
        <input type="password" id="signupPass" placeholder="Password" autocomplete="new-password" required>
        <input type="password" id="signupRePass" placeholder="Re-enter Password" autocomplete="new-password" required>

        <div class="btn-group">
            <button type="button" class="btn create-btn" onclick="createAccount()">Create</button>
            <button type="button" class="btn cancel-btn" onclick="clearSignup()">Cancel</button>
        </div>

        <div class="toggle" onclick="showLogin()">Already have account? Login</div>
    </form>

</div>

<script>
// ================= LOADER HELPERS =================
function showLoader() {
    const loader = document.getElementById("globalLoader");
    if (loader) {
        loader.classList.remove("hidden");
    }
}

function hideLoader() {
    const loader = document.getElementById("globalLoader");
    if (loader) {
        loader.classList.add("hidden");
    }
}

function showToast(message) {
    const toast = document.getElementById("toastPopup");
    if (!toast) return;
    toast.textContent = message;
    toast.classList.add("show");
    setTimeout(() => toast.classList.remove("show"), 3000);
}

// ================= TOGGLE =================
function showLogin() {
    document.getElementById("signup").classList.add("hidden");
    document.getElementById("login").classList.remove("hidden");
}

function showSignup() {
    document.getElementById("login").classList.add("hidden");
    document.getElementById("signup").classList.remove("hidden");
}

// ================= CLEAR =================
function clearSignup() {
    document.getElementById("signupUser").value = "";
    document.getElementById("signupPass").value = "";
    document.getElementById("signupRePass").value = "";
}

function clearLogin() {
    document.getElementById("loginUser").value = "";
    document.getElementById("loginPass").value = "";
}

// ================= REGISTER =================
async function createAccount() {
    let user = document.getElementById("signupUser").value;
    let pass = document.getElementById("signupPass").value;
    let repass = document.getElementById("signupRePass").value;

    if (!user || !pass || !repass) {
        alert("Please fill all fields!");
        return;
    }

    if (pass !== repass) {
        alert("Passwords do not match!");
        return;
    }

    showLoader();

    try {
        let res = await fetch("https://kr-timber-backendd.onrender.com/register", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({ user, pass })
        });

        let msg = await res.text();
        hideLoader();
        showToast("✅ " + msg);
        clearSignup();
        showLogin();
    } catch (err) {
        hideLoader();
        alert("Connection error. Please try again.");
    }
}

// ================= LOGIN =================
async function login() {
    let user = document.getElementById("loginUser").value.trim();
    let pass = document.getElementById("loginPass").value.trim();

    if (!user || !pass) {
        alert("Please fill all fields!");
        return;
    }

    showLoader();

    try {
        let res = await fetch("https://kr-timber-backendd.onrender.com/login", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({ user, pass })
        });

        let data = await res.json();

        hideLoader();

        if (data.success) {
            localStorage.setItem("isLoggedIn", "true");
            localStorage.setItem("currentUser", user);
            window.location.href = "home.html";
        } else {
            showToast("❌ Invalid login. Please try again.");
        }
    } catch (err) {
        hideLoader();
        showToast("⚠️ Server is starting up, please wait and try again...");
    }
}
</script>

</body>
</html>
